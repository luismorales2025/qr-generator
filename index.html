<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR PRO</title>

<!-- Librería para generar QR (NO tocar) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Cloudinary Widget (NO tocar) -->
<script src="https://upload-widget.cloudinary.com/global/all.js"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#0f2027;
    color:white;
}
input, textarea, button{
    margin:10px;
    padding:10px;
    width:80%;
}
#qrcode{
    margin-top:20px;
}
</style>
</head>

<body>

<h2>1. QR desde link</h2>
<input type="text" id="link" placeholder="https://...">
<button onclick="qrLink()">Generar QR</button>

<h2>2. Subir archivo (PDF, Word, Excel, etc)</h2>
<button onclick="subirArchivo()">Subir y generar QR</button>

<h2>3. Texto → documento</h2>
<textarea id="texto" placeholder="Escribe aquí..."></textarea>
<button onclick="crearTexto()">Generar QR</button>

<div id="qrcode"></div>

<script>

// =======================
// FUNCIÓN GENERAL QR
// =======================
function generarQR(url){
    document.getElementById("qrcode").innerHTML="";
    new QRCode(document.getElementById("qrcode"), url);
}

// =======================
// 1. LINK
// =======================
function qrLink(){
    let link = document.getElementById("link").value;
    generarQR(link);
}

// =======================
// 2. SUBIR ARCHIVO
// =======================
function subirArchivo(){

    var widget = cloudinary.createUploadWidget({

        // 🔴 AQUÍ VA TU CLOUD NAME
        // Lo encuentras en el dashboard de Cloudinary
        cloudName: 'dzdmmrpxa',

        // 🔴 AQUÍ VA TU UPLOAD PRESET
        // Este lo tienes que crear manualmente (te explico abajo)
        uploadPreset: 'unsigned_preset'

    }, (error, result) => {

        if (!error && result && result.event === "success") {

            // 🔥 ESTE ES EL LINK REAL DEL ARCHIVO SUBIDO
            let archivo = result.info.secure_url;

            // 👉 OPCIONAL: abrir Word, PDF tipo online (como Office)
            let urlVista = "https://view.officeapps.live.com/op/view.aspx?src=" + archivo;

            // 🔥 GENERA EL QR
            generarQR(urlVista);
        }
    });

    widget.open();
}

// =======================
// 3. TEXTO → DOCUMENTO
// =======================
function crearTexto(){

    let texto = document.getElementById("texto").value;

    // 🔴 ESTO SOLO FUNCIONA LOCALMENTE (NO EN INTERNET)
    // porque es un archivo temporal
    let blob = new Blob([texto], { type: "text/plain" });
    let url = URL.createObjectURL(blob);

    generarQR(url);
}

</script>

</body>
</html>
